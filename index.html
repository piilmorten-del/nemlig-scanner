<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nemlig Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f8;
      margin: 0;
      padding: 20px;
      color: #111;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    button, .button-link {
      display: inline-block;
      background: #111;
      color: white;
      border: none;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      margin: 8px 6px 0 0;
      text-decoration: none;
      font-size: 16px;
    }

    .secondary {
      background: #e5e7eb;
      color: #111;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    video {
      width: 100%;
      margin-top: 12px;
      border-radius: 12px;
      background: #000;
    }

    .box {
      background: #f1f5f9;
      padding: 14px;
      border-radius: 12px;
      margin-top: 14px;
    }

    .warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .result-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Nemlig Scanner</h1>

    <div class="box warning">
      <strong>Vigtigt:</strong><br>
      Appen bruger ikke nemligs interne produktdata. Den finder først produktet via stregkoden og hjælper dig derefter med at finde bedste match.
    </div>

    <h2>Scan med kamera</h2>
    <button onclick="startScanner()">Start scanning</button>
    <button class="secondary" onclick="stopScanner()">Stop scanning</button>

    <video id="video" muted playsinline></video>

    <h2>Indtast stregkode manuelt</h2>
    <input id="manualBarcode" placeholder="Indtast stregkode, fx 5711953070205" />
    <button onclick="lookupManualBarcode()">Find produkt</button>

    <div id="status" class="box muted">Klar</div>
    <div id="result"></div>
  </div>

  <script>
    let codeReader = null;

    function setStatus(text) {
      document.getElementById("status").innerText = text;
    }

    function cleanText(value) {
      if (!value) return "";
      return String(value).trim();
    }

    function buildGoogleSearchUrl(searchText) {
      return "https://www.google.com/search?q=" +
        encodeURIComponent("site:nemlig.com " + searchText);
    }

    function buildNemligSearchUrl(searchText) {
      return "https://www.nemlig.com/soegning/" +
        encodeURIComponent(searchText);
    }

    function buildFallbackGoogleUrl(barcode) {
      return "https://www.google.com/search?q=" +
        encodeURIComponent("site:nemlig.com " + barcode);
    }

    async function startScanner() {
      try {
        setStatus("Starter kamera...");

        codeReader = new ZXing.BrowserMultiFormatReader();

        await codeReader.decodeFromVideoDevice(null, "video", async function(result, error) {
          if (result) {
            const barcode = result.text;
            stopScanner();
            setStatus("Stregkode fundet: " + barcode);
            await lookupBarcode(barcode);
          }
        });
      } catch (error) {
        console.error(error);
        setStatus("Kameraet kunne ikke startes. Prøv at åbne siden via HTTPS, fx GitHub Pages.");
      }
    }

    function stopScanner() {
      if (codeReader) {
        codeReader.reset();
        codeReader = null;
      }
      setStatus("Scanning stoppet.");
    }

    async function lookupManualBarcode() {
      const barcode = document.getElementById("manualBarcode").value.trim();

      if (!barcode) {
        setStatus("Skriv en stregkode først.");
        return;
      }

      await lookupBarcode(barcode);
    }

    async function lookupBarcode(barcode) {
      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";

      setStatus("Slår stregkode op...");

      try {
        const openFoodFactsUrl =
          "https://world.openfoodfacts.org/api/v2/product/" +
          encodeURIComponent(barcode) +
          ".json";

        const response = await fetch(openFoodFactsUrl);
        const data = await response.json();

        if (!data || data.status !== 1 || !data.product) {
          showFallbackResult(barcode);
          return;
        }

        const product = data.product;

        const brand = cleanText(product.brands);
        const name =
          cleanText(product.product_name_da) ||
          cleanText(product.product_name) ||
          cleanText(product.generic_name_da) ||
          cleanText(product.generic_name);

        const quantity = cleanText(product.quantity);

        const searchText = [brand, name, quantity]
          .filter(Boolean)
          .join(" ")
          .replace(/\s+/g, " ")
          .trim();

        if (!searchText) {
          showFallbackResult(barcode);
          return;
        }

        const googleUrl = buildGoogleSearchUrl(searchText);
        const nemligUrl = buildNemligSearchUrl(searchText);

        resultDiv.innerHTML = `
          <div class="box">
            <div class="result-title">Produkt fundet</div>

            <p><strong>Stregkode:</strong> ${escapeHtml(barcode)}</p>
            <p><strong>Brand:</strong> ${escapeHtml(brand || "Ukendt")}</p>
            <p><strong>Produkt:</strong> ${escapeHtml(name || "Ukendt")}</p>
            <p><strong>Størrelse:</strong> ${escapeHtml(quantity || "Ukendt")}</p>

            <p class="muted">
              Brug først Google-knappen. Den søger kun på nemlig.com og finder ofte produktsiden bedre end nemligs egen søgning.
            </p>

            <a class="button-link" href="${googleUrl}" target="_blank" rel="noopener">
              Find via Google
            </a>

            <a class="button-link secondary" href="${nemligUrl}" target="_blank" rel="noopener">
              Prøv søgning på nemlig.com
            </a>
          </div>
        `;

        setStatus("Færdig. Brug helst 'Find via Google'.");
      } catch (error) {
        console.error(error);
        showFallbackResult(barcode);
      }
    }

    function showFallbackResult(barcode) {
      const resultDiv = document.getElementById("result");

      const googleUrl = buildFallbackGoogleUrl(barcode);
      const nemligUrl = buildNemligSearchUrl(barcode);

      resultDiv.innerHTML = `
        <div class="box">
          <div class="result-title">Produktet blev ikke fundet automatisk</div>

          <p><strong>Stregkode:</strong> ${escapeHtml(barcode)}</p>

          <p>
            Open Food Facts havde ikke nok data om produktet.
            Du kan stadig prøve at søge på stregkoden.
          </p>

          <a class="button-link" href="${googleUrl}" target="_blank" rel="noopener">
            Søg via Google
          </a>

          <a class="button-link secondary" href="${nemligUrl}" target="_blank" rel="noopener">
            Prøv søgning på nemlig.com
          </a>
        </div>
      `;

      setStatus("Produktet blev ikke fundet automatisk.");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
