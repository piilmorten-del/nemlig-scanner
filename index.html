<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nemlig Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://unpkg.com/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>

<style>
/* (samme styling som før – forkortet her for læsbarhed) */
body { font-family: Arial; background:#f7f7f3; margin:0; padding:14px; }
.card { background:white; padding:16px; border-radius:16px; margin-bottom:12px; }
button { padding:14px; border-radius:12px; border:0; background:#00a651; color:white; font-weight:bold; }
.secondary { background:#ddd; color:black; }
input { width:100%; padding:14px; margin-top:8px; border-radius:12px; border:1px solid #ccc; }
video, canvas { width:100%; margin-top:10px; border-radius:12px; }
</style>
</head>

<body>

<div class="card">
  <h2>1. Scan stregkode</h2>
  <button onclick="startScanner()">Start scanning</button>
  <button class="secondary" onclick="stopScanner()">Stop</button>
  <video id="video" playsinline muted></video>
</div>

<div class="card">
  <h2>2. Tag billede af produkt</h2>
  <button onclick="startCameraForPhoto()">Tag billede</button>
  <button class="secondary" onclick="takePhoto()">Tag snapshot</button>
  <video id="photoVideo" playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="ocrStatus"></div>
</div>

<div class="card">
  <h2>3. Manuel indtastning</h2>
  <input id="manualBarcode" placeholder="Stregkode" />
  <button onclick="lookupManualBarcode()">Find produkt</button>
</div>

<div id="result"></div>

<script>
let codeReader;
let photoStream;

// ENTER = søg
document.getElementById("manualBarcode").addEventListener("keydown", e => {
  if (e.key === "Enter") lookupManualBarcode();
});

// -------- STREGKODE --------
async function startScanner() {
  codeReader = new ZXing.BrowserMultiFormatReader();
  await codeReader.decodeFromVideoDevice(null, "video", (res) => {
    if (res) {
      stopScanner();
      lookupBarcode(res.text);
    }
  });
}

function stopScanner() {
  if (codeReader) codeReader.reset();
}

// -------- FOTO --------
async function startCameraForPhoto() {
  photoStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  document.getElementById("photoVideo").srcObject = photoStream;
}

async function takePhoto() {
  const video = document.getElementById("photoVideo");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  document.getElementById("ocrStatus").innerText = "Læser tekst...";

  const result = await Tesseract.recognize(canvas, 'dan+eng');

  const text = result.data.text;

  document.getElementById("ocrStatus").innerText = "Tekst fundet";

  fillEditableFields("", "", text.split("\n")[0], "", "");
}

// -------- DATA --------
async function lookupManualBarcode() {
  const code = document.getElementById("manualBarcode").value;
  lookupBarcode(code);
}

async function lookupBarcode(barcode) {
  const res = await fetch("https://world.openfoodfacts.org/api/v2/product/" + barcode + ".json");
  const data = await res.json();

  if (data.status === 1) {
    const p = data.product;

    fillEditableFields(
      barcode,
      p.brands || "",
      p.product_name || "",
      p.quantity || "",
      ""
    );
  } else {
    fillEditableFields(barcode, "", "", "", "");
  }
}

// -------- FELTER --------
function fillEditableFields(barcode, brand, product, size, extra) {
  document.getElementById("result").innerHTML = `
    <div class="card">
      <input id="editBrand" placeholder="Brand" value="${brand}">
      <input id="editProduct" placeholder="Produkt" value="${product}">
      <input id="editSize" placeholder="Størrelse" value="${size}">
      <input id="editExtra" placeholder="Ekstra søgeord" value="${extra}">

      <button onclick="openBest()">Gå direkte til bedste bud</button>
      <button onclick="openGoogle()">Søg via Google</button>
    </div>
  `;

  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

// -------- SØGNING --------
function getSearch() {
  return [
    document.getElementById("editBrand").value,
    document.getElementById("editProduct").value,
    document.getElementById("editSize").value,
    document.getElementById("editExtra").value
  ].join(" ");
}

function openBest() {
  window.open("https://www.google.com/search?btnI=1&q=" + encodeURIComponent("site:nemlig.com " + getSearch()));
}

function openGoogle() {
  window.open("https://www.google.com/search?q=" + encodeURIComponent("site:nemlig.com " + getSearch()));
}
</script>

</body>
</html>
