<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nemlig Scanner</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f8;
      margin: 0;
      padding: 20px;
      color: #111;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 { margin-top: 0; }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    video {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    .box {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      background: #111;
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Nemlig Scanner</h1>

    <button onclick="startScanner()">Start scanning</button>
    <button onclick="stopScanner()">Stop</button>

    <video id="video"></video>

    <input id="manualBarcode" placeholder="Indtast stregkode" />
    <button onclick="lookupManualBarcode()">Find produkt</button>

    <div id="status" class="box">Klar</div>
    <div id="result"></div>
  </div>

  <script>
    let codeReader;

    function setStatus(text) {
      document.getElementById("status").innerText = text;
    }

    function buildNemligSearchUrl(searchText) {
      const cleaned = searchText
        .replace(/\b\d{13}\b/g, "")
        .replace(/\s+/g, " ")
        .trim();

      return "https://www.google.com/search?q=" + encodeURIComponent("site:nemlig.com " + cleaned);
    }

    async function startScanner() {
      codeReader = new ZXing.BrowserMultiFormatReader();

      codeReader.decodeFromVideoDevice(null, "video", async (result, err) => {
        if (result) {
          stopScanner();
          await lookupBarcode(result.text);
        }
      });
    }

    function stopScanner() {
      if (codeReader) codeReader.reset();
    }

    async function lookupManualBarcode() {
      const code = document.getElementById("manualBarcode").value;
      await lookupBarcode(code);
    }

    async function lookupBarcode(barcode) {
      setStatus("Slår op...");
      document.getElementById("result").innerHTML = "";

      try {
        const res = await fetch("https://world.openfoodfacts.org/api/v2/product/" + barcode + ".json");
        const data = await res.json();

        if (data.status !== 1) {
          showFallback(barcode);
          return;
        }

        const p = data.product;

        const name = p.product_name || "";
        const brand = p.brands || "";
        const quantity = p.quantity || "";

        const search = `${brand} ${name} ${quantity}`.trim();

        const url = buildNemligSearchUrl(search);

        document.getElementById("result").innerHTML = `
          <div class="box">
            <b>Produkt:</b> ${name}<br>
            <b>Brand:</b> ${brand}<br>
            <b>Størrelse:</b> ${quantity}<br>
            <a href="${url}" target="_blank">Find på nemlig.com</a>
          </div>
        `;

        setStatus("Fundet");
      } catch (e) {
        showFallback(barcode);
      }
    }

    function showFallback(barcode) {
      const url = buildNemligSearchUrl(barcode);

      document.getElementById("result").innerHTML = `
        <div class="box">
          Produkt ikke fundet automatisk.<br>
          <a href="${url}" target="_blank">Søg manuelt</a>
        </div>
      `;

      setStatus("Ikke fundet");
    }
  </script>
</body>
</html>
